server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    # Default response headers for all mock API responses
    add_header Content-Type "application/json" always;
    add_header X-Mock-Server "nginx" always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

    # Handle CORS preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # GET /test-route
    location = /test-route {
        default_type application/json;
        return 200 '{"message" : "Hello from the mock API! This is a test route."}';
    }

    # GET /status
    location = /status {
        default_type application/json;
        return 200 '{"status":"ok","service":"example-api","timestamp":"$time_iso8601","uptime_seconds":86400}';
    }

    # GET /health
    location = /health {
        default_type application/json;
        return 200 '{"healthy":true,"checks":{"database":"pass","cache":"pass","queue":"pass"},"version":"1.0.0","timestamp":"$time_iso8601"}';
    }

    # GET /data
    location = /data {
        default_type application/json;
        return 200 '{"data":[{"id":1,"name":"Sample Item A","value":42,"active":true},{"id":2,"name":"Sample Item B","value":87,"active":false},{"id":3,"name":"Sample Item C","value":13,"active":true}],"total":3,"page":1,"per_page":10}';
    }

    # GET /skill-creator
    location = /skill-creator {
        default_type application/json;
        return 200 '{"skill":"creator","description":"Creates and manages skills dynamically","capabilities":["create","read","update","delete","evaluate"],"version":"2.0.0","ready":true}';
    }

    # Catch-all: 404 for unknown routes
    location / {
      default_type application/json;
      return 404 '{"error":"not_found","message":"The requested endpoint does not exist","path":"$request_uri"}';
    } 


    # Logging
    access_log /var/log/nginx/api.example.com.access.log;
    error_log  /var/log/nginx/api.example.com.error.log warn;
}
