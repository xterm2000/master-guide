apiVersion: v1
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        default_type application/json;

        location = / {
            return 200 '{"message": "use /health /status /data"}';
        }

        location = /health {
            return 200 '{"health": "ok"}';
        }

        location = /status {
            return 200 '{"status": "running"}';
        }

        location = /data {
            return 200 '{
      "customers": [
        {"id": 1, "name": "Alice Martin",  "email": "alice@example.com",  "city": "Paris",    "since": "2021-03-15"},
        {"id": 2, "name": "Bob Chen",      "email": "bob@example.com",    "city": "Toronto",  "since": "2022-07-04"},
        {"id": 3, "name": "Clara Diaz",    "email": "clara@example.com",  "city": "Madrid",   "since": "2020-11-22"},
        {"id": 4, "name": "David Müller",  "email": "david@example.com",  "city": "Berlin",   "since": "2023-01-09"},
        {"id": 5, "name": "Eva Rossi",     "email": "eva@example.com",    "city": "Rome",     "since": "2019-06-30"}
      ]
    }';
        }
    }
kind: ConfigMap
metadata:
  name: mock-conf
