networks:
  devops_net:
    driver: bridge

services:

  # jenkins 
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    restart: unless-stopped
    privileged: true
    user: root
    ports:
      - "8080:8080"   # Web UI
      - "50000:50000" # Agent communication
    volumes:
      - /opt/devops/jenkins/home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock # Docker-in-Docker support
      - /usr/bin/docker:/usr/bin/docker   # ← add this
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
    networks:
      - devops_net

  # image repo
  nexus:
    image: sonatype/nexus3:latest
    container_name: nexus
    restart: unless-stopped
    ports:
      - "8081:8081"   # Web UI / Maven repos
      - "8082:8082"   # Docker hosted registry
      - "8083:8083"   # Docker proxy registry
    volumes:
      - /opt/devops/nexus/home:/nexus-data
    environment:
      - INSTALL4J_ADD_VM_PARAMS=-Xms1g -Xmx2g -XX:MaxDirectMemorySize=2g
    networks:
      - devops_net
  
  # gitea       
  gitea:
    depends_on:
    - db

    image: docker.gitea.com/gitea:latest
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=db:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=gitea        
      - GITEA__webhook__ALLOWED_HOST_LIST=192.168.68.200  # ← add this
    restart: unless-stopped
    networks:
      - devops_net
    volumes:
      - /opt/devops/gitea/data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8085:3000" ## UI and http git
      - "222:22" ## https - requires token 

  # postgres 
  db:
    image: docker.io/library/postgres:14
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=postgres
    networks:
      - devops_net
    volumes:
      - /opt/devops/postgres/data:/var/lib/postgresql/data # data
      - /opt/devops/postgres/initdb:/docker-entrypoint-initdb.d # init scripts 

  # jaeger      
  jaeger:
    networks:
      - devops_net
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    environment:
      # Opens a Zipkin-compatible HTTP collector on port 9411.
      # Without this, Jaeger only listens for its own native format.
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    ports:
      - "16686:16686"   # Jaeger web UI
      - "9411:9411"     # Zipkin-compatible span ingestion
    mem_limit: 512m
    cpus: "0.5"
    restart: unless-stopped
 

 
